[loggers]
keys=root,updater

[handlers]
keys=consoleHandler,fileHandler

[formatters]
keys=simpleFormatter

[logger_root]
level=WARNING
handlers=consoleHandler

[logger_updater]
level=INFO
handlers=consoleHandler,fileHandler
qualname=updater
propagate=0

[handler_consoleHandler]
class=StreamHandler
level=INFO
formatter=simpleFormatter
args=(sys.stdout,)

[handler_fileHandler]
class=handlers.TimedRotatingFileHandler
level=INFO
formatter=simpleFormatter
; CWD(설치 폴더) 기준. updater가 시작 시 작업 디렉터리를 설치 폴더로 고정한다.
args=('./logs/updater.log', 'midnight', 1, 7, 'utf-8')

[formatter_simpleFormatter]
format=%(asctime)s - %(name)s - %(levelname)s - %(message)s
datefmt=%Y-%m-%d %H:%M:%S
