[loggers]
keys=root,ingest-agent

[handlers]
keys=consoleHandler,fileHandler

[formatters]
keys=simpleFormatter

[logger_root]
level=WARNING
handlers=consoleHandler

[logger_ingest-agent]
level=DEBUG
handlers=consoleHandler,fileHandler
qualname=ingest-agent
propagate=0

[handler_consoleHandler]
class=StreamHandler
level=DEBUG
formatter=simpleFormatter
args=(sys.stdout,)

[handler_fileHandler]
class=handlers.TimedRotatingFileHandler
level=DEBUG
formatter=simpleFormatter
; windows
args=('./logs/ingest-agent.log', 'midnight', 1, 7, 'utf-8')
; test debug
; args=('../../logs/ingest-agent.log', 'midnight', 1, 7, 'utf-8')
; linux
; args=('../logs/ingest-agent.log', 'midnight', 1, 7, 'utf-8')

[formatter_simpleFormatter]
format=%(asctime)s - %(name)s - %(levelname)s - [%(thread)d] - %(message)s
datefmt=%Y-%m-%d %H:%M:%S
